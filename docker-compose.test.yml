# Test / Staging environment
name: yps-academy-test

services:
  mongo:
    image: mongo:7
    container_name: yps-mongo-test
    restart: unless-stopped
    volumes:
      - mongo-test-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: yps-academy-test
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      target: production
    container_name: yps-backend-test
    restart: unless-stopped
    ports:
      - "4026:4026"
    environment:
      NODE_ENV: test
      PORT: 4026
      MONGODB_URI: mongodb://mongo:27017/yps-academy-test
      FRONTEND_URL: https://test.yps-academy.com
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_CONFIG: test
    container_name: yps-frontend-test
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-test-data:
