# Deploy to Production (FREE)
# ─ Frontend → Vercel production deployment (--prod flag)
# ─ Backend  → Render (triggered via deploy hook)
# ─ Database → MongoDB Atlas free M0 cluster
#
# Required GitHub Secrets:
#   VERCEL_TOKEN           — from https://vercel.com/account/tokens
#   VERCEL_ORG_ID          — from `vercel link` or .vercel/project.json
#   VERCEL_PROJECT_ID      — from `vercel link` or .vercel/project.json
#   RENDER_PROD_DEPLOY_HOOK — Render service → Settings → Deploy Hook URL

name: Deploy — Production (Free)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Frontend → Vercel (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Deploy to Vercel (production)
        run: |
          npx vercel build --cwd frontend --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
          npx vercel deploy --prebuilt --cwd frontend --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    name: Backend → Render (prod service)
    needs: [deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"
