# Sync main into develop and staging after every merge to main.
# This keeps all three environments up-to-date automatically.

name: Sync main into develop and staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-develop:
    name: Merge main into develop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into develop
        run: |
          git checkout develop
          git merge origin/main --no-edit --strategy-option=theirs
          git push origin develop

  sync-staging:
    name: Merge main into staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into staging
        run: |
          git checkout staging
          git merge origin/main --no-edit --strategy-option=theirs
          git push origin staging
