# Deploy to Test / Staging (FREE)
# ─ Frontend → Vercel preview with staging alias
# ─ Backend  → Render (triggered via deploy hook)
# ─ Database → MongoDB Atlas free M0 cluster
#
# Required GitHub Secrets:
#   VERCEL_TOKEN           — from https://vercel.com/account/tokens
#   VERCEL_ORG_ID          — from `vercel link` or .vercel/project.json
#   VERCEL_PROJECT_ID      — from `vercel link` or .vercel/project.json
#   RENDER_TEST_DEPLOY_HOOK — Render service → Settings → Deploy Hook URL

name: Deploy — Test/Staging (Free)

on:
  workflow_dispatch: # disabled auto-deploy; trigger manually when needed

jobs:
  deploy-frontend:
    name: Frontend → Vercel (staging alias)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Deploy to Vercel (staging)
        run: |
          npx vercel build --cwd frontend --token ${{ secrets.VERCEL_TOKEN }} --yes
          DEPLOY_URL=$(npx vercel deploy --prebuilt --cwd frontend --token ${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | tail -1)
          npx vercel alias --cwd frontend --token ${{ secrets.VERCEL_TOKEN }} "$DEPLOY_URL" staging-yps-academy.vercel.app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    name: Backend → Render (test service)
    needs: [deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL "${{ secrets.RENDER_TEST_DEPLOY_HOOK }}"
