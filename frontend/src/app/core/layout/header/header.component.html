<mat-toolbar color="primary" class="app-header">
  <!-- Menu Toggle Button (Mobile) -->
  <button
    mat-icon-button
    (click)="onMenuToggle()"
    aria-label="Toggle menu"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <!-- App Logo/Branding -->
  <div class="app-branding" (click)="goToDashboard()">
    <mat-icon class="brand-icon">school</mat-icon>
    <span class="brand-text">YPS Academy</span>
  </div>

  <span class="spacer"></span>

  <!-- Header Actions -->
  <div class="header-actions">
    <!-- Search (placeholder) -->
    <button
      mat-icon-button
      aria-label="Search"
      matTooltip="Search"
    >
      <mat-icon>search</mat-icon>
    </button>

    <!-- Theme Toggle -->
    <button
      mat-icon-button
      (click)="toggleTheme()"
      [attr.aria-label]="themeTooltip()"
      [matTooltip]="themeTooltip()"
    >
      <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>

    <!-- Notifications -->
    <button
      mat-icon-button
      aria-label="Notifications"
      matTooltip="Notifications"
      (click)="openNotifications()"
    >
      <mat-icon matBadge="3" matBadgeColor="warn" matBadgeSize="small">
        notifications
      </mat-icon>
    </button>

    <!-- User Menu -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="userMenu"
      aria-label="User menu"
      matTooltip="User menu"
    >
      <mat-icon>account_circle</mat-icon>
    </button>
  </div>
</mat-toolbar>

<!-- User Menu -->
<mat-menu #userMenu="matMenu">
  <button mat-menu-item>
    <mat-icon>person</mat-icon>
    <span>Profile</span>
  </button>
  <button mat-menu-item>
    <mat-icon>settings</mat-icon>
    <span>Settings</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item>
    <mat-icon>exit_to_app</mat-icon>
    <span>Logout</span>
  </button>
</mat-menu>
