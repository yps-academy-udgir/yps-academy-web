<div class="sidebar">
  <!-- Sidebar Header -->
  <div class="sidebar-header">
    <h3 class="sidebar-title">Navigation</h3>
  </div>

  <!-- Navigation Menu -->
  <mat-nav-list class="nav-list">
    @for (item of menuItems(); track item.route) {
      <a
        mat-list-item
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/students' }"
        (click)="onNavigate()"
        class="nav-item"
      >
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
        @if (item.badge) {
          <span matListItemMeta class="badge">{{ item.badge }}</span>
        }
      </a>
    }
  </mat-nav-list>

  <mat-divider></mat-divider>

  <!-- Additional Actions Section -->
  <div class="sidebar-footer">
    <mat-nav-list>
      <a mat-list-item class="nav-item">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
      <a mat-list-item class="nav-item">
        <mat-icon matListItemIcon>help</mat-icon>
        <span matListItemTitle>Help & Support</span>
      </a>
    </mat-nav-list>
  </div>
</div>
